<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login Admin</title>

<style>
body{
  font-family:Arial;
  background:#0f172a;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  background:#1e293b;
  padding:30px;
  border-radius:15px;
  width:300px;
}

input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:10px;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:white;
}
</style>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyB2vua5gMe7hspIMtVunPAmWWkUB3-nt5A",
  authDomain: "aldia-app1.firebaseapp.com",
  projectId: "aldia-app1",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = async () => {

  const email = document.getElementById("email").value;
  const pass = document.getElementById("pass").value;

  try{
    await signInWithEmailAndPassword(auth, email, pass);
    window.location.href = "admin.html";
  }catch(e){
    alert("Error login");
  }
};

</script>

</head>

<body>

<div class="box">
  <h2>Admin Login</h2>

  <input id="email" placeholder="Email">
  <input id="pass" type="password" placeholder="Contraseña">

  <button onclick="login()">Ingresar</button>
</div>

</body>
</html>
