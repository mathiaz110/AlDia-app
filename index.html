<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AlDía App</title>

<link rel="stylesheet" href="style.css">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-storage.js";

const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "TU_DOMINIO",
  projectId: "TU_PROYECTO",
  storageBucket: "TU_BUCKET",
  messagingSenderId: "XXXX",
  appId: "XXXX"
};

const app = initializeApp(firebaseConfig);

window.db = getFirestore(app);
window.storage = getStorage(app);
window.addDoc = addDoc;
window.collection = collection;
window.ref = ref;
window.uploadBytes = uploadBytes;
window.getDownloadURL = getDownloadURL;
</script>

</head>

<body>

<div class="app">

<header>
  <h1>AlDía</h1>
  <p>Tu boleta digital</p>
</header>

<!-- PANTALLA 1 -->
<section class="pantalla activa" id="pantallaTerminos">
  <h2>Términos</h2>

  <div class="check">
    <input type="checkbox" id="checkTerminos">
    <label>Acepto los términos</label>
  </div>

  <button id="btnContinuar" disabled>Continuar</button>
</section>

<!-- PANTALLA 2 -->
<section class="pantalla" id="pantallaRegistro">

  <input id="nombre" placeholder="Nombre y Apellido">
  <input id="dni" placeholder="DNI">
  <input id="usuario" placeholder="Número de usuario">
  <input id="direccion" placeholder="Dirección">
  <input id="celular" placeholder="Celular">

  <div class="pago-box">
    <p>Alias: <span id="aliasTexto">tualias.mp</span></p>

    <button id="btnCopiar">Copiar Alias</button>
    <button id="btnMP">Ir a Mercado Pago</button>

    <input type="file" id="comprobante">
    <button id="btnEnviar">Enviar comprobante</button>
  </div>

</section>

<!-- PANTALLA 3 -->
<section class="pantalla" id="pantallaEstado">
  <h2 id="estadoTitulo">Procesando...</h2>
  <p id="estadoTexto">Verificando pago</p>
</section>

</div>

<script src="script.js"></script>

</body>
</html>
