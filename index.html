<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AlDía App</title>

<link rel="stylesheet" href="style.css">

<!-- 🔥 TU FIREBASE (RESPETADO) -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
  import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-analytics.js";
  import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
  import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-storage.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB2vua5gMe7hspIMtVunPAmWWkUB3-nt5A",
    authDomain: "aldia-app1.firebaseapp.com",
    projectId: "aldia-app1",
    storageBucket: "aldia-app1.firebasestorage.app",
    messagingSenderId: "1013051386288",
    appId: "1:1013051386288:web:e588c83d0892d6cbab4e75",
    measurementId: "G-28VQ7VM4KS"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const storage = getStorage(app);

  // GLOBAL
  window.db = db;
  window.storage = storage;
  window.addDoc = addDoc;
  window.collection = collection;
  window.ref = ref;
  window.uploadBytes = uploadBytes;
  window.getDownloadURL = getDownloadURL;
</script>

</head>

<body>

<div class="app">

<header>
  <h1>AlDía</h1>
  <p>Tu boleta digital</p>
</header>

<!-- PANTALLA 1 -->
<section class="pantalla activa" id="pantallaTerminos">
  <h2>Términos</h2>

  <div class="check">
    <input type="checkbox" id="checkTerminos" onchange="habilitarBoton()">
    <label>Acepto los términos</label>
  </div>

  <button id="btnContinuar" onclick="aceptarTerminos()" disabled>
    Continuar
  </button>
</section>

<!-- PANTALLA 2 -->
<section class="pantalla" id="pantallaRegistro">

  <input id="nombre" placeholder="Nombre y Apellido">
  <input id="dni" placeholder="DNI">
  <input id="usuario" placeholder="Número de usuario">
  <input id="direccion" placeholder="Dirección">
  <input id="celular" placeholder="Celular">

  <button onclick="registrar()">Registrarse</button>

  <div class="pago-box">
    <p>Alias: <span id="aliasTexto">contrerassmathias</span></p>

    <button onclick="copiarAlias()">Copiar Alias</button>
    <button onclick="abrirMP()">Ir a Mercado Pago</button>

    <input type="file" id="comprobante">
    <button onclick="subirComprobante()">Enviar comprobante</button>
  </div>

</section>

<!-- PANTALLA 3 -->
<section class="pantalla" id="pantallaEstado">
  <h2 id="estadoTitulo">Procesando...</h2>
  <p id="estadoTexto">Verificando pago</p>
</section>

</div>

<script src="script.js"></script>

</body>
</html>
