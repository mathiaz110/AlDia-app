<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AlDía App</title>

<link rel="stylesheet" href="style.css">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-storage.js";

const firebaseConfig = {
apiKey: "AIzaSyB2vua5gMe7hspIMtVunPAmWWkUB3-nt5A",
authDomain: "aldia-app1.firebaseapp.com",
projectId: "aldia-app1",
storageBucket: "aldia-app1.firebasestorage.com",
mensajesSenderId: "1013051386288",
appId: "1:1013051386288:web:e588c83d0892d6cbab4e75",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

window.db = db;
window.storage = storage;
window.addDoc = addDoc;
window.collection = collection;
window.ref = ref;
window.uploadBytes = uploadBytes;
window.getDownloadURL = getDownloadURL;
</script>

</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <div class="logo">AlDía ⚡</div>
  <div class="spinner"></div>
</div>

<div class="app">

<header>
<h1>AlDía</h1>
<p>Tu boleta digital</p>
</header>

<!-- TERMINOS -->
<section class="card pantalla" id="pantallaTerminos">

<h2>Términos y condiciones</h2>

<div class="contrato show">
<p>
Autorizo el uso de mis datos para solicitar boletas, gestionar pagos y comunicaciones.
</p>
</div>

<div class="check">
<input type="checkbox" id="checkTerminos" onchange="habilitarBoton()">
<label>Acepto los términos</label>
</div>

<button id="btnContinuar" onclick="aceptarTerminos()" disabled>
Aceptar y continuar
</button>

</section>

<!-- REGISTRO -->
<section class="card pantalla oculta" id="pantallaRegistro">

<input id="nombre" placeholder="Nombre y Apellido">
<input id="dni" placeholder="DNI">
<input id="usuario" placeholder="Número de usuario">
<input id="direccion" placeholder="Dirección">
<input id="celular" placeholder="Celular">

<button class="pulse" onclick="registrar()">Activar servicio y pagar</button>

<div class="loader" id="loader">
<div></div>
<p>Procesando...</p>
</div>

<div class="pago-box">

<p><strong>Pago</strong></p>

<p>Alias: <span id="aliasTexto">tualias.mp</span></p>

<button onclick="copiarAlias()">Copiar Alias</button>
<button onclick="abrirMP()">Ir a Mercado Pago</button>

<input type="file" id="comprobante">
<button onclick="subirComprobante()">Enviar comprobante</button>

</div>

</section>

</div>

<script src="script.js"></script>

</body>
</html>
